<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MYTI · 米哈游人格测试 | 24题无权重 · 32角色向量库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0719 0%, #1a1333 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            color: #f0eef7;
            padding: 1.5rem 1rem 3rem;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 80px 200px, #ffd966, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px, 300px 300px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #FFD966, #E6B422, #C47E2E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        .progress-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 0.25rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .progress-bar {
            background: linear-gradient(90deg, #e6b422, #ff8c42);
            height: 8px;
            border-radius: 30px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            display: flex;
            justify-content: flex-end;
            font-size: 0.75rem;
            margin-top: 6px;
            color: #ddccaa;
        }

        .question-card {
            background: rgba(20, 16, 40, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.4rem 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(230, 180, 70, 0.3);
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .opt-btn {
            flex: 1;
            min-width: 180px;
            background: rgba(10, 8, 25, 0.7);
            border: 1px solid #4a3f6e;
            border-radius: 60px;
            padding: 12px 16px;
            color: #e8e2ff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .opt-btn.active {
            background: linear-gradient(105deg, #e6b422, #ff9f4a);
            border-color: #ffd966;
            color: #1a0f2e;
            font-weight: bold;
            box-shadow: 0 0 12px #ffb34780;
        }

        @media (max-width: 550px) {
            .opt-btn {
                min-width: 100%;
            }
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2rem 0 1rem;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(30, 25, 55, 0.9);
            color: #ffeaac;
            border: 1px solid #e6b422;
        }

        .btn-primary {
            background: linear-gradient(95deg, #e6b422, #d97a1c);
            color: #1e102b;
            border: none;
        }

        .result-card {
            background: rgba(10, 6, 25, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 1.8rem;
            margin-top: 2rem;
            border: 1px solid #e6b42266;
        }

        .vector-bars {
            margin: 1rem 0;
        }

        .vector-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .vector-label {
            width: 70px;
            font-weight: bold;
        }

        .vector-bar-bg {
            flex: 1;
            height: 12px;
            background: #2a2346;
            border-radius: 20px;
            overflow: hidden;
        }

        .vector-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e6b422, #ff9f4a);
            width: 0%;
            border-radius: 20px;
        }

        .role-card {
            background: #1e173eaa;
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        /* 主结果头像 */
        .role-card .avatar {
            width: 120px;
            height: auto;
            border-radius: 0;
            margin-bottom: 12px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid #e6b422;
        }

        /* 副结果小卡片头像 */
        .mini-card .avatar {
            width: 70px;
            height: auto;
            border-radius: 0;
            display: block;
            margin: 0 auto 8px;
            border: 1px solid #ffd966;
        }

        .role-card img {
            width: 100px;
            height: 100px;
        }

        .mini-card img {
            width: 60px;
            height: 60px;
        }

        .role-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffdf99;
        }

        .game-tag {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .quote {
            font-style: italic;
            background: #00000055;
            padding: 0.8rem;
            border-radius: 24px;
            margin: 0.8rem 0;
        }

        .top3-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .mini-card {
            background: #0f0b29;
            border-radius: 24px;
            padding: 0.8rem;
            width: 140px;
            text-align: center;
            border: 1px solid #e6b42255;
        }

        .similarity {
            font-size: 0.8rem;
            color: #ffd966;
            font-weight: bold;
        }

        .radar-container {
            max-width: 280px;
            margin: 1rem auto;
        }

        .share-btn {
            background: #1f1b3c;
            border: 1px solid #e6b422;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 3rem;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1c162f;
            max-width: 320px;
            width: 85%;
            border-radius: 48px;
            padding: 2rem 1.5rem;
            text-align: center;
            border: 1px solid #ffd966;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            background: #2a2346;
            padding: 12px;
            border-radius: 60px;
            border: none;
            color: #ffeaac;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-btn.confirm {
            background: #e6b422;
            color: #140e2b;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1><i class="fas fa-dragon"></i> MYTI · 旅者之铭 <i class="fas fa-star-of-life"></i></h1>
            <p>灵魂律动 · 表里之道 · 因果编织 · 契约归属 | 24题 · 32角色向量匹配</p>
        </div>
        <div class="progress-area">
            <div class="progress-bar" id="progressFill"></div>
            <div class="progress-text" id="progressLabel">0 / 24 次抉择</div>
        </div>
        <div id="questionsArea"></div>
        <div class="action-buttons">
            <button class="btn" id="resetBtn"><i class="fas fa-undo-alt"></i> 重燃旅途</button>
            <button class="btn btn-primary" id="submitBtn"><i class="fas fa-gem"></i> 揭示命途</button>
        </div>
        <div id="resultArea"></div>
        <footer>✦ 凭直觉而选，米哈游宇宙之魂 ✦</footer>
    </div>
    <div id="tieModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-balance-scale" style="font-size: 2rem; color:#e6b422;"></i>
            <h3 id="modalTitle">两种力量势均力敌</h3>
            <p id="modalMessage">检测到你两种倾向持平，请选择你内心更偏向的那一方。</p>
            <div class="modal-buttons" id="modalOptions"></div>
        </div>
    </div>

    <script>
        // ======================= 24道题目 (每维度6题，权重均为1) =======================
        const QUESTIONS = [
            // 灵魂律动 燃R/静J
            { id: 1, text: "周末醒来，你更可能：", dim: "soul", opts: [{ txt: "立刻跳起来，今天有好多事要做！", trait: "R" }, { txt: "赖床刷手机，慢慢清醒再决定干嘛。", trait: "J" }] },
            { id: 2, text: "朋友喊你吃火锅，但地方很远，你会：", dim: "soul", opts: [{ txt: "“走！为了毛肚跑半个城也值！”", trait: "R" }, { txt: "“要不换家近的？或者点外卖？”", trait: "J" }] },
            { id: 3, text: "游戏卡关/工作遇到难题，你第一反应：", dim: "soul", opts: [{ txt: "头铁硬刚，试它十遍！", trait: "R" }, { txt: "查攻略/问大佬，找最优解。", trait: "J" }] },
            { id: 4, text: "计划旅行时，你更像：", dim: "soul", opts: [{ txt: "特种兵式打卡，一天跑八个景点。", trait: "R" }, { txt: "佛系躺酒店，随缘逛吃。", trait: "J" }] },
            { id: 5, text: "在 KTV 或派对上，你通常是：", dim: "soul", opts: [{ txt: "麦霸，主动点歌唱跳。", trait: "R" }, { txt: "安静坐着，帮大家鼓掌。", trait: "J" }] },
            { id: 6, text: "支持的队伍落后时，你会：", dim: "soul", opts: [{ txt: "激动发弹幕：“翻盘！翻盘！”", trait: "R" }, { txt: "默默看着，心里分析哪里出问题。", trait: "J" }] },
            // 表里之道 诚C/隐Y
            { id: 7, text: "朋友跟你抱怨另一个人，你会：", dim: "surface", opts: [{ txt: "直接说我的真实看法，哪怕不好听。", trait: "C" }, { txt: "先附和，再委婉引导他换个角度。", trait: "Y" }] },
            { id: 8, text: "你发朋友圈的频率和内容是：", dim: "surface", opts: [{ txt: "想发就发，几乎不分组，真实记录生活。", trait: "C" }, { txt: "很少发，或者精心分组，只展示想给人看的一面。", trait: "Y" }] },
            { id: 9, text: "面对不喜欢的领导/老师，你会：", dim: "surface", opts: [{ txt: "不爽就写在脸上，但该做的还是会做。", trait: "C" }, { txt: "表面恭敬，心里默默翻白眼。", trait: "Y" }] },
            { id: 10, text: "有人告诉你一个秘密，并让你保密，你会：", dim: "surface", opts: [{ txt: "绝对不说，但会觉得憋得难受。", trait: "C" }, { txt: "轻松守住，甚至能面不改色地打岔。", trait: "Y" }] },
            { id: 11, text: "收到不喜欢的礼物，你会：", dim: "surface", opts: [{ txt: "直接说：“这个不太适合我，能换一个吗？”", trait: "C" }, { txt: "笑着收下，说谢谢，回头再处理。", trait: "Y" }] },
            { id: 12, text: "别人对你的第一印象往往是：", dim: "surface", opts: [{ txt: "一眼就能看透，没什么心机。", trait: "C" }, { txt: "挺有距离感，需要深交才了解。", trait: "Y" }] },
            // 因果编织 谋M/随S
            { id: 13, text: "买大件（如手机、电脑）前，你会：", dim: "causality", opts: [{ txt: "看测评、比参数、蹲好价，至少研究一周。", trait: "M" }, { txt: "看眼缘，差不多就买了，早买早享受。", trait: "S" }] },
            { id: 14, text: "你更习惯：", dim: "causality", opts: [{ txt: "列To-Do List，按优先级完成。", trait: "M" }, { txt: "想到哪做到哪，deadline是第一生产力。", trait: "S" }] },
            { id: 15, text: "抽卡前你会：", dim: "causality", opts: [{ txt: "算保底、看玄学时间、垫池子。", trait: "M" }, { txt: "随缘单抽，出了惊喜，没出拉倒。", trait: "S" }] },
            { id: 16, text: "精心做的计划突然被打乱，你会：", dim: "causality", opts: [{ txt: "烦躁但迅速重排，备选方案启动。", trait: "M" }, { txt: "“那就这样吧”，顺势开启新节奏。", trait: "S" }] },
            { id: 17, text: "你的房间/桌面通常是：", dim: "causality", opts: [{ txt: "分门别类，每样东西都有固定位置。", trait: "M" }, { txt: "乱中有序，我知道东西在哪就行。", trait: "S" }] },
            { id: 18, text: "发工资/生活费后，你会：", dim: "causality", opts: [{ txt: "先做预算，控制支出，存固定比例。", trait: "M" }, { txt: "该花就花，剩下多少存多少。", trait: "S" }] },
            // 契约归属 护H/独D
            { id: 19, text: "小组作业/项目里，你通常：", dim: "contract", opts: [{ txt: "主动多做一些，怕队友做不好。", trait: "H" }, { txt: "做好自己的部分，不多管闲事。", trait: "D" }] },
            { id: 20, text: "累了一天，哪种方式最能回血？", dim: "contract", opts: [{ txt: "和朋友聚会、开黑、聊天。", trait: "H" }, { txt: "一个人宅家刷剧、打游戏、发呆。", trait: "D" }] },
            { id: 21, text: "路边有人需要帮助（如问路、搬东西），你会：", dim: "contract", opts: [{ txt: "主动上前询问帮忙。", trait: "H" }, { txt: "如果他没开口，我就路过。", trait: "D" }] },
            { id: 22, text: "你更向往：", dim: "contract", opts: [{ txt: "和三五好友住同一个小区，随时串门。", trait: "H" }, { txt: "独居大房子，没人打扰我的节奏。", trait: "D" }] },
            { id: 23, text: "你生病时更希望：", dim: "contract", opts: [{ txt: "有人陪我去医院，照顾我。", trait: "H" }, { txt: "自己扛着，不想麻烦别人。", trait: "D" }] },
            { id: 24, text: "做人生重大决定（换工作、搬家等）时，你会：", dim: "contract", opts: [{ txt: "和亲友商量，听取多方意见。", trait: "H" }, { txt: "自己分析利弊，独自决定。", trait: "D" }] }
        ];

        // ======================= 32角色向量库 (燃%,诚%,谋%,护%) =======================
        const CHARACTERS = [
            { id: "kiana", name: "琪亚娜·卡斯兰娜", game: "崩坏3", vector: [85, 75, 35, 90], desc: "从叛逆少女成长为背负一切的战士，热血真诚，守护至上。", quote: "“纵使长夜无尽，我也要成为照亮世界的太阳！”", avatar: "image/caolvchong.png" },
            { id: "otto", name: "奥托·阿波卡利斯", game: "崩坏3", vector: [30, 10, 95, 15], desc: "五百年谋略家，为复活卡莲不惜一切，深藏不露。", quote: "“世界当然不够完美，所以我们才需要为此奋斗。”", avatar: "image/aotuo.png" },
            { id: "bronya", name: "布洛妮娅·扎伊切克", game: "崩坏3", vector: [20, 85, 85, 85], desc: "冷静、重情、善谋，守护希儿是她最大的动力。", quote: "“重装小兔，目标锁定。我不会再失去任何人。”", avatar: "image/buruoniya.png" },
            { id: "mei", name: "雷电芽衣", game: "崩坏3", vector: [55, 60, 70, 65], desc: "从温柔到决绝，兼具行动力与谋略，守护同伴。", quote: "“雷光所至，皆为吾心。”", avatar: "image/leidianyayi.png" },
            { id: "fu_hua", name: "符华", game: "崩坏3", vector: [25, 80, 80, 75], desc: "五万年的守护者，冷静克制，忠诚坚定。", quote: "“赤鸢之翼，永不折戟。”", avatar: "image/fuhua.png" },
            { id: "kevin", name: "凯文·卡斯兰娜", game: "崩坏3", vector: [70, 30, 85, 40], desc: "为救世不择手段，热血与冷酷并存。", quote: "“为了大多数人，少数人的牺牲是必要的。”", avatar: "image/kaiwen.png" },
            { id: "elysia", name: "爱莉希雅", game: "崩坏3", vector: [80, 90, 40, 85], desc: "如飞花般绚烂，真诚热爱一切美好，守护同伴。", quote: "“我就是我，是颜色不一样的烟火~”", avatar: "image/ailixiya.png" },
            { id: "seele", name: "希儿·芙乐艾", game: "崩坏3", vector: [40, 75, 50, 80], desc: "温柔内敛，但为保护他人可以变得强大。", quote: "“另一个我，请借给我力量。”", avatar: "image/xier.png" },
            { id: "traveler", name: "旅行者（荧/空）", game: "原神", vector: [60, 70, 50, 75], desc: "寻亲之旅中不断结交同伴，兼具热血与温柔。", quote: "“只要坚信自己的道路，就无所谓天气是晴是雨。”", avatar: "image/lvxingzhe.png" },
            { id: "paimon", name: "派蒙", game: "原神", vector: [70, 85, 20, 85], desc: "最好的伙伴，话多但真诚，永远站在旅行者身边。", quote: "“前面的区域，以后再来探索吧！”", avatar: "image/paimeng.png" },
            { id: "zhongli", name: "钟离", game: "原神", vector: [10, 70, 85, 70], desc: "六千年的契约之神，冷静谋划，守护璃月。", quote: "“契约既成，食言者当受食岩之罚。”", avatar: "image/zhongli.png" },
            { id: "raiden_shogun", name: "雷电将军（影）", game: "原神", vector: [15, 20, 90, 15], desc: "追求永恒，斩断羁绊，孤独的统治者。", quote: "“稻光如梦，此刻即是永恒。”", avatar: "image/leidianjiangjun.png" },
            { id: "nahida", name: "纳西妲", game: "原神", vector: [20, 85, 85, 90], desc: "智慧与温柔并存的草神，用知识守护须弥。", quote: "“知识无法让人变得完美，但可以让人变得完整。”", avatar: "image/naxida.png" },
            { id: "furina", name: "芙宁娜", game: "原神", vector: [55, 25, 75, 60], desc: "五百年扮演神明，外表浮夸，内心孤独。", quote: "“审判！哦不，演出开始了！”", avatar: "image/funingna.png" },
            { id: "tartaglia", name: "达达利亚", game: "原神", vector: [90, 70, 55, 30], desc: "战斗狂，享受挑战，对家人温柔但对敌人冷酷。", quote: "“强者就该挑战更强，这就是我的战斗之道。”", avatar: "image/dadaliya.png" },
            { id: "hutao", name: "胡桃", game: "原神", vector: [80, 85, 30, 70], desc: "古灵精怪，真诚直率，独行但不冷漠。", quote: "“生死有命，快乐就行。买单？下次一定！”", avatar: "image/hutao.png" },
            { id: "albedo", name: "阿贝多", game: "原神", vector: [20, 70, 80, 50], desc: "专注炼金术，冷静温柔，享受独处。", quote: "“真理与孤独相伴，但创造本身就是一种温柔。”", avatar: "image/abeiduo.png" },

            { id: "anby", name: "安比", game: "绝区零", vector: [20, 75, 35, 65], desc: "冷静高效，话少但可靠，默默守护。", quote: "“任务完成。下一个。”", avatar: "image/anbi.png" },
            { id: "billy", name: "比利", game: "绝区零", vector: [85, 80, 30, 75], desc: "热血中二，真诚直率，是可靠的同伴。", quote: "“星徽骑士，参上！”", avatar: "image/bili.png" },
            { id: "koleda", name: "珂蕾妲", game: "绝区零", vector: [70, 60, 65, 80], desc: "白祇重工老板，热血务实，守护员工。", quote: "“工地的安全，由我来守护！”", avatar: "image/kelaita.png" }
        ];

        let userAnswers = {};
        let currentRadarChart = null;

        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questionsArea');
            container.innerHTML = '';
            QUESTIONS.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML = `
                <div class="question-text">${q.text}</div>
                <div class="options" data-qid="${q.id}">
                    ${q.opts.map(opt => `<div class="opt-btn" data-trait="${opt.trait}">${opt.txt}</div>`).join('')}
                </div>
            `;
                container.appendChild(card);
                const saved = userAnswers[q.id];
                if (saved) {
                    const btns = card.querySelectorAll('.opt-btn');
                    btns.forEach(btn => { if (btn.dataset.trait === saved) btn.classList.add('active'); });
                }
                const optDivs = card.querySelectorAll('.opt-btn');
                optDivs.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const trait = btn.dataset.trait;
                        userAnswers[q.id] = trait;
                        optDivs.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        updateProgress();
                        saveToLocal();
                    });
                });
            });
            updateProgress();
        }

        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const total = QUESTIONS.length;
            const percent = (answered / total) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressLabel').innerText = `${answered} / ${total} 次抉择`;
        }

        function saveToLocal() { localStorage.setItem('myti_24_answers', JSON.stringify(userAnswers)); }
        function loadFromLocal() {
            const saved = localStorage.getItem('myti_24_answers');
            if (saved) { try { userAnswers = JSON.parse(saved); renderQuestions(); } catch (e) { userAnswers = {}; renderQuestions(); } }
            else { userAnswers = {}; renderQuestions(); }
        }

        // 计分：每个维度独立，每道题1分，得到倾向原始分（0-6）
        function computeRawScores() {
            const scores = { soul: { R: 0, J: 0 }, surface: { C: 0, Y: 0 }, causality: { M: 0, S: 0 }, contract: { H: 0, D: 0 } };
            for (let q of QUESTIONS) {
                const selected = userAnswers[q.id];
                if (!selected) continue;
                scores[q.dim][selected] += 1;
            }
            return scores;
        }

        // 弹窗处理平分 (返回处理后的scores)
        function resolveTieBreaks(scores, onComplete) {
            let ties = [];
            for (let dim of ['soul', 'surface', 'causality', 'contract']) {
                const [optA, optB] = (dim === 'soul' ? ['R', 'J'] : (dim === 'surface' ? ['C', 'Y'] : (dim === 'causality' ? ['M', 'S'] : ['H', 'D'])));
                if (scores[dim][optA] === scores[dim][optB]) ties.push({ dim, optA, optB });
            }
            if (ties.length === 0) { onComplete(scores); return; }
            const tie = ties[0];
            const dimMap = { soul: '灵魂律动', surface: '表里之道', causality: '因果编织', contract: '契约归属' };
            const traitMap = { soul: ['燃(R)', '静(J)'], surface: ['诚(C)', '隐(Y)'], causality: ['谋(M)', '随(S)'], contract: ['护(H)', '独(D)'] };
            const modal = document.getElementById('tieModal');
            const modalOptions = document.getElementById('modalOptions');
            document.getElementById('modalTitle').innerHTML = `⚖️ ${dimMap[tie.dim]} · 势均力敌`;
            document.getElementById('modalMessage').innerHTML = `两种力量在你体内势均力敌，请选择你内心更偏向的那一方。`;
            modalOptions.innerHTML = `
            <button class="modal-btn confirm" data-choice="${tie.optA}">我更偏向「${traitMap[tie.dim][0]}」</button>
            <button class="modal-btn" data-choice="${tie.optB}">我更偏向「${traitMap[tie.dim][1]}」</button>
        `;
            modal.style.display = 'flex';
            const handler = (e) => {
                if (e.target.classList.contains('modal-btn')) {
                    const choice = e.target.dataset.choice;
                    modal.style.display = 'none';
                    scores[tie.dim][choice] += 0.001; // 微小增量打破平局
                    modalOptions.removeEventListener('click', handler);
                    resolveTieBreaks(scores, onComplete);
                }
            };
            modalOptions.addEventListener('click', handler);
        }

        // 计算用户向量 [燃%,诚%,谋%,护%] (每个分量0-100)
        function computeUserVector(scores) {
            const R = (scores.soul.R / 6) * 100;
            const C = (scores.surface.C / 6) * 100;
            const M = (scores.causality.M / 6) * 100;
            const H = (scores.contract.H / 6) * 100;
            return [R, C, M, H];
        }

        // 欧氏距离转相似度 (最大距离200)
        function computeSimilarity(userVec, charVec) {
            let distance = Math.hypot(
                userVec[0] - charVec[0],
                userVec[1] - charVec[1],
                userVec[2] - charVec[2],
                userVec[3] - charVec[3]
            );
            let maxDist = 200;
            let similarity = ((maxDist - distance) / maxDist) * 100;
            return Math.max(0, Math.min(100, similarity));
        }

        function findTopMatches(userVec, characters, topN = 3) {
            return characters.map(c => ({
                ...c,
                similarity: computeSimilarity(userVec, c.vector)
            })).sort((a, b) => b.similarity - a.similarity).slice(0, topN);
        }

        // 显示结果
        function displayResult(userVec, topMatches) {
            const main = topMatches[0];
            const others = topMatches.slice(1);
            let html = `
            <div class="result-card">
                <h3><i class="fas fa-chart-line"></i> 你的人格向量</h3>
                <div class="vector-bars">
                    <div class="vector-item"><span class="vector-label">🔥 燃</span><div class="vector-bar-bg"><div class="vector-bar-fill" style="width:${userVec[0]}%"></div></div><span>${Math.round(userVec[0])}%</span></div>
                    <div class="vector-item"><span class="vector-label">✨ 诚</span><div class="vector-bar-bg"><div class="vector-bar-fill" style="width:${userVec[1]}%"></div></div><span>${Math.round(userVec[1])}%</span></div>
                    <div class="vector-item"><span class="vector-label">📐 谋</span><div class="vector-bar-bg"><div class="vector-bar-fill" style="width:${userVec[2]}%"></div></div><span>${Math.round(userVec[2])}%</span></div>
                    <div class="vector-item"><span class="vector-label">🛡️ 护</span><div class="vector-bar-bg"><div class="vector-bar-fill" style="width:${userVec[3]}%"></div></div><span>${Math.round(userVec[3])}%</span></div>
                </div>
                <div class="radar-container"><canvas id="radarCanvas" width="250" height="250"></canvas></div>
                <h3><i class="fas fa-star-of-life"></i> 你的灵魂共鸣 · TOP1</h3>
                <div class="role-card">
                    <div class="role-name">${main.name}</div>
                    <img src="${main.avatar}" class="avatar">
                    <div class="role-name">${main.name}</div>
                    <div class="game-tag"><i class="fas fa-gamepad"></i> ${main.game}</div>
                    <div class="quote">${main.quote}</div>
                    <div>${main.desc}</div>
                    <div class="similarity">✨ 灵魂相似度 ${main.similarity.toFixed(1)}% ✨</div>
                </div>
        `;
            if (others.length) {
                html += `<h4>🌌 相近命途 · 其他可能</h4><div class="top3-grid">`;
                others.forEach(other => {
                    html += `<div class="mini-card"><img src="${other.avatar}"class="avatar"><i class="fas fa-user"></i> <strong>${other.name}</strong><div class="game-tag">${other.game}</div><div class="similarity">契合度 ${other.similarity.toFixed(1)}%</div></div>`;
                });
                html += `</div>`;
                if (main.similarity - others[0].similarity <= 3) {
                    html += `<p style="text-align:center; margin-top:0.5rem;"><i class="fas fa-hand-peace"></i> 你和 ${others[0].name} 也有着相似的灵魂！</p>`;
                }
            }
            html += `<button id="shareResultBtn" class="btn share-btn"><i class="fas fa-camera"></i> 铭刻命途 · 分享卡片</button></div>`;
            document.getElementById('resultArea').innerHTML = html;

            // 雷达图
            const ctx = document.getElementById('radarCanvas')?.getContext('2d');
            if (ctx) {
                if (currentRadarChart) currentRadarChart.destroy();
                currentRadarChart = new Chart(ctx, {
                    type: 'radar',
                    data: { labels: ['燃 (R)', '诚 (C)', '谋 (M)', '护 (H)'], datasets: [{ label: '你的人格向量', data: userVec, backgroundColor: 'rgba(230,180,34,0.3)', borderColor: '#ffcc66', borderWidth: 2, pointBackgroundColor: '#ffaa33', pointBorderColor: '#fff' }] },
                    options: { responsive: true, maintainAspectRatio: true, scales: { r: { min: 0, max: 100, ticks: { stepSize: 20, color: '#ddd' }, grid: { color: '#5f4c8b' } } }, plugins: { legend: { labels: { color: '#f5e7c8' } } } }
                });
            }
            document.getElementById('shareResultBtn')?.addEventListener('click', () => {
                alert("分享卡片功能可截图保存 ✨ 您的人格向量已生成，感谢参与！");
            });
        }

        function onSubmit() {
            const answeredCount = Object.keys(userAnswers).length;
            if (answeredCount !== QUESTIONS.length) {
                alert(`旅途未竟！已完成 ${answeredCount}/${QUESTIONS.length} 题，请继续抉择～`);
                return;
            }
            const rawScores = computeRawScores();
            resolveTieBreaks(rawScores, (finalScores) => {
                const userVec = computeUserVector(finalScores);
                const topMatches = findTopMatches(userVec, CHARACTERS, 3);
                displayResult(userVec, topMatches);
                document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
            });
        }

        function resetTest() {
            localStorage.removeItem('myti_24_answers');
            userAnswers = {};
            renderQuestions();
            document.getElementById('resultArea').innerHTML = '';
            if (currentRadarChart) { currentRadarChart.destroy(); currentRadarChart = null; }
            updateProgress();
        }

        document.getElementById('submitBtn').addEventListener('click', onSubmit);
        document.getElementById('resetBtn').addEventListener('click', resetTest);
        loadFromLocal();
    </script>
